<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>WALTER/lite — Settings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 320px;
      height: 340px;
      overflow: hidden;
      background: transparent;
    }

    .panel {
      width: 320px;
      height: 340px;
      background: #111;
      border: 1px solid #2a2a2a;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      flex-direction: column;
      -webkit-app-region: drag;
    }

    .titlebar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 12px 7px;
      border-bottom: 1px solid #1e1e1e;
      flex-shrink: 0;
    }

    .title {
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 1.5px;
      color: #f0a500;
    }

    .close-btn {
      -webkit-app-region: no-drag;
      cursor: pointer;
      font-family: Arial, sans-serif;
      font-size: 15px;
      color: #2e2e2e;
      line-height: 1;
      padding: 0 1px;
      transition: color 0.15s;
    }
    .close-btn:hover { color: #555; }

    .body {
      flex: 1;
      padding: 10px 14px 6px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      -webkit-app-region: no-drag;
      overflow-y: auto;
    }

    .section-label {
      font-size: 7px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #2a2a2a;
      margin-top: 4px;
      border-top: 1px solid #1a1a1a;
      padding-top: 7px;
    }
    .section-label:first-child { border-top: none; padding-top: 0; margin-top: 0; }

    .field {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    label {
      font-size: 8px;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: #3a3a3a;
    }

    input {
      background: #0d0d0d;
      border: 1px solid #222;
      color: #c8c8c8;
      font-family: 'Courier New', Courier, monospace;
      font-size: 10px;
      padding: 5px 7px;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }
    input:focus { border-color: #f0a500; }
    input::placeholder { color: #262626; }

    .hint {
      font-size: 7.5px;
      letter-spacing: 0.4px;
      color: #242424;
      line-height: 1.5;
      -webkit-app-region: no-drag;
      padding: 0 14px 4px;
      flex-shrink: 0;
    }

    .footer {
      display: flex;
      justify-content: flex-end;
      gap: 7px;
      padding: 0 14px 11px;
      flex-shrink: 0;
      -webkit-app-region: no-drag;
    }

    .btn {
      font-family: 'Courier New', Courier, monospace;
      font-size: 9px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 5px 12px;
      cursor: pointer;
      border: 1px solid #252525;
      background: #161616;
      color: #3a3a3a;
      transition: all 0.15s;
    }
    .btn:hover { border-color: #444; color: #888; }

    .btn--save {
      border-color: #5a3a00;
      color: #f0a500;
      background: #1a1000;
    }
    .btn--save:hover { border-color: #f0a500; background: #2a1800; }

    .msg {
      font-size: 8px;
      letter-spacing: 0.8px;
      text-align: right;
      padding: 0 14px 6px;
      color: transparent;
      height: 13px;
      flex-shrink: 0;
      -webkit-app-region: no-drag;
      transition: color 0.3s;
    }
    .msg.ok  { color: #3dff7a; }
    .msg.err { color: #ff4444; }
  </style>
</head>
<body>
  <div class="panel">
    <div class="titlebar">
      <span class="title">SETTINGS</span>
      <span class="close-btn" id="closeBtn">×</span>
    </div>

    <div class="body">
      <div class="section-label">Telegram</div>
      <div class="field">
        <label>Bot Token</label>
        <input type="password" id="token" placeholder="123456:ABC-DEF…" autocomplete="off" spellcheck="false" />
      </div>
      <div class="field">
        <label>Allowed User ID</label>
        <input type="text" id="userId" placeholder="123456789" autocomplete="off" spellcheck="false" />
      </div>

      <div class="section-label">Voice &amp; Intent</div>
      <div class="field">
        <label>Groq API Key — Whisper transcription</label>
        <input type="password" id="groqKey" placeholder="gsk_…" autocomplete="off" spellcheck="false" />
      </div>
      <div class="field">
        <label>Intent API Key — leave blank to reuse Groq key</label>
        <input type="password" id="intentKey" placeholder="sk-or-… (OpenRouter) or same Groq key" autocomplete="off" spellcheck="false" />
      </div>
      <div class="field">
        <label>Intent Model — fast classifier (64 tokens, picks command type)</label>
        <input type="text" id="intentModel" placeholder="llama-3.1-8b-instant  (fast) or llama-3.3-70b-versatile" autocomplete="off" spellcheck="false" />
      </div>
      <div class="field">
        <label>Planner Model — task planner (1024 tokens, builds step plans) — defaults to Intent Model</label>
        <input type="text" id="plannerModel" placeholder="llama-3.3-70b-versatile  or  google/gemini-2.0-flash-exp:free" autocomplete="off" spellcheck="false" />
      </div>
    </div>

    <div class="hint">
      AI: Claude Code CLI + Firefox/Gemini — no API keys needed &nbsp;|&nbsp; Hotkey: Ctrl+Shift+Space
    </div>
    <div class="msg" id="msg"></div>

    <div class="footer">
      <button class="btn" id="cancelBtn">Cancel</button>
      <button class="btn btn--save" id="saveBtn">Save</button>
    </div>
  </div>

  <script>
    const tokenInput       = document.getElementById('token');
    const userIdInput      = document.getElementById('userId');
    const groqInput         = document.getElementById('groqKey');
    const intentKeyInput    = document.getElementById('intentKey');
    const intentModelInput  = document.getElementById('intentModel');
    const plannerModelInput = document.getElementById('plannerModel');
    const msg               = document.getElementById('msg');

    function showMsg(text, type) {
      msg.textContent = text;
      msg.className = `msg ${type}`;
      setTimeout(() => { msg.textContent = ''; msg.className = 'msg'; }, 2500);
    }

    window.walterSettings.getSettings().then(({ token, userId, groqKey, intentKey, intentModel, plannerModel }) => {
      if (token)         tokenInput.value        = token;
      if (userId)        userIdInput.value       = userId;
      if (groqKey)       groqInput.value         = groqKey;
      if (intentKey)     intentKeyInput.value    = intentKey;
      if (intentModel)   intentModelInput.value  = intentModel;
      if (plannerModel)  plannerModelInput.value = plannerModel;
    });

    document.getElementById('closeBtn').addEventListener('click',  () => window.walterSettings.close());
    document.getElementById('cancelBtn').addEventListener('click', () => window.walterSettings.close());

    document.getElementById('saveBtn').addEventListener('click', async () => {
      const token        = tokenInput.value.trim();
      const userId       = userIdInput.value.trim();
      const groqKey      = groqInput.value.trim();
      const intentKey    = intentKeyInput.value.trim();
      const intentModel  = intentModelInput.value.trim();
      const plannerModel = plannerModelInput.value.trim();
      if (!token || !userId) { showMsg('token and user ID required', 'err'); return; }
      try {
        await window.walterSettings.saveSettings({ token, userId, groqKey, intentKey, intentModel, plannerModel });
        showMsg('saved — bot restarted', 'ok');
        setTimeout(() => window.walterSettings.close(), 1200);
      } catch (err) {
        showMsg(err.message.slice(0, 40), 'err');
      }
    });
  </script>
</body>
</html>
